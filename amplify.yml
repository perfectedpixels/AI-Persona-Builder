version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --legacy-peer-deps
        - echo "Backend build complete"
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
        - cd client && npm install
    build:
      commands:
        - mkdir -p client
        - echo "VITE_API_URL=$VITE_API_URL" > client/.env
        - cd client && npm run build
  artifacts:
    baseDirectory: client/build
    files:
      - '**/*'
