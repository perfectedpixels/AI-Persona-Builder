server {
    listen 80;
    server_name ai-personamaker.jllevine.people.aws.dev;

    # Serve static files directly
    location /static/ {
        alias /home/ec2-user/conversation-maker/dist/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        alias /home/ec2-user/conversation-maker/dist/favicon.ico;
    }

    location /logo192.png {
        alias /home/ec2-user/conversation-maker/dist/logo192.png;
    }

    location /logo512.png {
        alias /home/ec2-user/conversation-maker/dist/logo512.png;
    }

    location /manifest.json {
        alias /home/ec2-user/conversation-maker/dist/manifest.json;
    }

    # Proxy API requests
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve index.html for root and SPA routes
    location / {
        root /home/ec2-user/conversation-maker/dist;
        try_files $uri $uri/ /index.html;
    }
}
